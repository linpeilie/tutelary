syntax = "proto3";

package com.tutelary.grpc;

option java_multiple_files = true;
option java_package = "com.tutelary.grpc.lib";
option java_outer_classname = "ClientRegisterProto";

service ClientRegisterService {
  rpc Register(ClientRegisterRequest) returns (ClientRegisterResponse) {
  }
}

message ClientRegisterRequest {
  string app_name = 1;
  string instance_id = 2;
}

message ClientRegisterResponse {
  string instance_id = 1;
}